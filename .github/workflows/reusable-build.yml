name: Build Reusable Sysext

on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
        description: "The name of the extension (used for the Containerfile suffix and image name)"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # Required permissions to push to GHCR using the automatic token
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up ORAS
        uses: oras-project/setup-oras@v1

      - name: Log in to GHCR with ORAS
        run: oras login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

      - name: Build and export rootfs
        run: |
          docker buildx build \
            -f ./repo/Containerfile.${{ inputs.name }} \
            --output type=local,dest=./rootfs \
            .

      - name: Push artifact with ORAS
        run: |
          cd rootfs
          oras push ghcr.io/${{ github.repository_owner }}/${{ inputs.name }}:latest ./usr